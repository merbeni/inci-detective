# Deploys the Cloudflare Worker when its code changes on main.
# Vercel already auto-deploys the SPA; the Worker was the manual step.
#
# Requires a repo secret CLOUDFLARE_API_TOKEN (Workers Scripts: Edit). Until
# it's configured the job detects the missing secret and skips gracefully.
name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for the Cloudflare token
        id: token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: echo "present=$([ -n "$CLOUDFLARE_API_TOKEN" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - name: Deploy
        if: steps.token.outputs.present == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Skipped (no token)
        if: steps.token.outputs.present != 'true'
        run: echo "CLOUDFLARE_API_TOKEN not set — deploy the Worker manually with 'npx wrangler deploy'."
