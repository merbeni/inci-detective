# Lint, test and build on every push / PR to main. The dataset files
# (src/data/*.json) are gitignored build artifacts, so `pretest` regenerates
# them before vitest runs and `npm run build` regenerates them again for vite.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
