# Quality gate: lint + unit tests + build + dependency audit on every push/PR,
# plus the Playwright E2E suite. The dataset files are gitignored build
# artifacts, so `pretest` regenerates them before vitest and `npm run build`
# regenerates them again for vite. The Worker deploys from deploy-worker.yml.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Fail on high+ vulnerabilities in production deps; dev-only issues warn.
      - name: Audit (production deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Audit (all deps, informational)
        run: npm audit --audit-level=high
        continue-on-error: true

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
