# Cloudflare Worker config for INCI Detective's server-side AI.
#
# Deploy:  npx wrangler deploy
# Secret:  npx wrangler secret put GEMINI_API_KEY
#
# The Vectorize index must exist first:
#   npx wrangler vectorize create inci-ingredients --dimensions=384 --metric=cosine
#
# Open Beauty Facts contribution (POST /api/obf) needs a write-API account —
# create one at https://world.openbeautyfacts.org (same account works across
# all Open*Facts sites) and set it as two more secrets:
#   npx wrangler secret put OBF_USER_ID
#   npx wrangler secret put OBF_PASSWORD
# Until both are set, /api/obf replies 503 not_configured (feature stays dark).

name = "inci-detective-api"
main = "worker/index.js"
compatibility_date = "2024-09-23"
# Pinned so CI's scoped API token (Workers Scripts: Edit only) doesn't need
# account-discovery permissions. Not a secret — it's in every dashboard URL.
account_id = "52285f97bc479b0f9602846e477b03aa"

# Workers AI — used to embed search queries (bge-small-en-v1.5, 384 dims).
[ai]
binding = "AI"

# Vectorize — the ingredient vector index.
[[vectorize]]
binding = "VECTORIZE"
index_name = "inci-ingredients"

# Allowed CORS origins (comma-separated). Add your real Vercel domain here.
# APP_ORIGIN / SUPABASE_* feed the /share/* OG-preview route: the anon key is
# the same public one the client ships, safe to keep in plain vars.
[vars]
ALLOWED_ORIGIN = "https://inci-detective.vercel.app,http://localhost:5173"
APP_ORIGIN = "https://inci-detective.vercel.app"
SUPABASE_URL = "https://shmdzlffwjhxcrhtkpfd.supabase.co"
SUPABASE_ANON_KEY = "sb_publishable_Q0Bps6Y1EvJP1KrVEq_xgA_kBjt8FMm"

# Workers Logs — captures console.error from the routes (worker errors +
# client errors reported via /api/log). View under the Worker's "Logs" tab.
[observability]
enabled = true

# Rate limits. Signed-in users (verified Supabase JWT) get RATE_LIMITER keyed
# per user; anonymous callers of /api/ai + /api/search share the smaller
# per-IP RATE_LIMITER_ANON. Other routes use RATE_LIMITER per IP.
# `namespace_id` is just a unique-per-worker numeric label, not an account id.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_ANON"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 8, period = 60 }
